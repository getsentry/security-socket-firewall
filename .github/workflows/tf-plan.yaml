name: Terraform Plan

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: tf plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v 6.0.2

      - name: gcp auth (tf plan)
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_PLAN_SERVICE_ACCOUNT }}

      - name: terraform plan
        id: terraform-apply
        uses: dflook/terraform-plan@7878bff63e2099cdc9be9a6f33cbbbf687f8f0fe  # v2.2.3
        if:
          ${{ steps.auth.outcome == 'success'}}
        with:
          add_github_comment: changes-only
          path: terraform